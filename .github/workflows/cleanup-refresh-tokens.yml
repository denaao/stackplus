name: Cleanup Refresh Tokens

# Substituiu o CronSchedule do Railway (removido após incidente 21/04).
# Roda o job de purge de RefreshTokens expirados/revogados há mais de 7 dias
# (grace period configurável via REFRESH_TOKEN_CLEANUP_GRACE_DAYS).
#
# Por que GitHub Actions em vez de Railway Cron:
# - Isolamento total: falha do workflow não afeta o serviço web
# - Logs persistentes no histórico do Actions (30+ dias vs 7d do Railway)
# - Sem risco de railway.toml compartilhado disparar server em vez do job
# - Execução manual (workflow_dispatch) facil via UI do GitHub

on:
  schedule:
    # Domingo às 07:00 UTC = 04:00 BRT (sem tráfego de home game).
    - cron: '0 7 * * 0'
  workflow_dispatch:
    inputs:
      grace_days:
        description: 'Grace period em dias (default 7). Tokens expirados/revogados há mais que isso são deletados.'
        required: false
        default: '7'

concurrency:
  group: cleanup-refresh-tokens
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  cleanup:
    name: Purge expired refresh tokens
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: stackplus-api
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stackplus-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Run cleanup job
        env:
          # DATABASE_URL apontando pro Postgres de produção no Railway.
          # Configurado em GitHub → Settings → Secrets → Actions.
          DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
          # Grace period pode ser sobrescrito em execuções manuais.
          REFRESH_TOKEN_CLEANUP_GRACE_DAYS: ${{ github.event.inputs.grace_days || '7' }}
          # Timeout conservador pro job em si (além do timeout do workflow).
          CLEANUP_JOB_TIMEOUT_MS: '60000'
        run: npm run job:cleanup-refresh-tokens
