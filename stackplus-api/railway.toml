[build]
builder = "NIXPACKS"
# --include=dev força npm a instalar devDependencies mesmo com NODE_ENV=production.
# O tsc (TypeScript) é devDep e precisa estar presente pro `npm run build`.
buildCommand = "npm install --include=dev && npm run build && npx prisma generate"

[deploy]
startCommand = "npx prisma migrate deploy --schema prisma/schema.prisma && node dist/server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
